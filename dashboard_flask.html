<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Anomaly Detection Dashboard - Flask</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            opacity: 0.9;
            font-size: 1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
        }

        .stat-card.anomaly {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
            animation: pulse-red 1s infinite;
        }

        .stat-card.normal {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.5);
        }

        @keyframes pulse-red {

            0%,
            100% {
                box-shadow: 0 8px 32px rgba(239, 68, 68, 0.3);
            }

            50% {
                box-shadow: 0 8px 32px rgba(239, 68, 68, 0.6);
            }
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .status {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .status.connected {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
        }

        .status.disconnected {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
        }

        .pulse {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.3;
                transform: scale(1.1);
            }
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .tech-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 15px;
            margin: 5px;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🖥️ CPU Anomaly Detection Dashboard</h1>
        <div class="subtitle">Flask + Socket.IO + Scikit-Learn RandomForest</div>

        <div class="status connected" id="status">
            <span class="pulse"></span>
            <span id="statusText">Connecting to server...</span>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Current CPU Usage</h3>
                <div class="value" id="currentCPU">--</div>
            </div>
            <div class="stat-card" id="statusCard">
                <h3>Status</h3>
                <div class="value" id="statusValue">--</div>
            </div>
            <div class="stat-card">
                <h3>Total Anomalies</h3>
                <div class="value" id="totalAnomalies">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Samples</h3>
                <div class="value" id="totalSamples">0</div>
            </div>
            <div class="stat-card">
                <h3>Anomaly Rate</h3>
                <div class="value" id="anomalyRate">0%</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="cpuChart"></canvas>
        </div>

        <div class="footer">
            <div>
                <span class="tech-badge">🐍 Python Flask</span>
                <span class="tech-badge">🔌 Socket.IO</span>
                <span class="tech-badge">🌲 RandomForest (200 trees)</span>
                <span class="tech-badge">📊 Chart.js</span>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let totalAnomalies = 0;
        let totalSamples = 0;
        const maxDataPoints = 60;

        const ctx = document.getElementById('cpuChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'CPU Usage (%)',
                        data: [],
                        borderColor: 'rgb(99, 102, 241)',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        tension: 0.4,
                        fill: true,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        borderWidth: 2,
                    },
                    {
                        label: 'Anomalies',
                        data: [],
                        borderColor: 'rgb(239, 68, 68)',
                        backgroundColor: 'rgba(239, 68, 68, 0.8)',
                        pointRadius: 8,
                        pointHoverRadius: 10,
                        showLine: false,
                        pointStyle: 'triangle',
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                aspectRatio: 2.5,
                animation: {
                    duration: 300
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        title: {
                            display: true,
                            text: 'CPU Usage (%)',
                            font: { size: 14, weight: 'bold' }
                        },
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)'
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Time',
                            font: { size: 14, weight: 'bold' }
                        },
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)'
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: true,
                        position: 'top',
                        labels: {
                            font: { size: 12 },
                            usePointStyle: true,
                            boxWidth: 8
                        }
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        callbacks: {
                            label: function (context) {
                                let label = context.dataset.label || '';
                                if (label) {
                                    label += ': ';
                                }
                                if (context.parsed.y !== null) {
                                    label += context.parsed.y.toFixed(2) + '%';
                                }
                                return label;
                            }
                        }
                    }
                }
            }
        });

        socket.on('connect', () => {
            document.getElementById('status').className = 'status connected';
            document.getElementById('statusText').innerHTML = '<span class="pulse"></span>Connected - Monitoring CPU with RandomForest';
            console.log('[INFO] Connected to Flask server');
        });

        socket.on('disconnect', () => {
            document.getElementById('status').className = 'status disconnected';
            document.getElementById('statusText').textContent = 'Disconnected from server';
            console.log('[INFO] Disconnected from server');
        });

        socket.on('cpu-data', (data) => {
            console.log('[DEBUG] Received data:', data);
            const time = new Date(data.timestamp).toLocaleTimeString();
            const cpuValue = parseFloat(data.cpu_usage);
            const isAnomaly = data.prediction === 1;

            totalSamples++;
            if (isAnomaly) totalAnomalies++;

            const anomalyRate = totalSamples > 0 ? ((totalAnomalies / totalSamples) * 100).toFixed(1) : 0;

            // Update stats
            document.getElementById('currentCPU').textContent = cpuValue.toFixed(2) + '%';
            document.getElementById('totalAnomalies').textContent = totalAnomalies;
            document.getElementById('totalSamples').textContent = totalSamples;
            document.getElementById('anomalyRate').textContent = anomalyRate + '%';

            const statusCard = document.getElementById('statusCard');
            const statusValue = document.getElementById('statusValue');
            if (isAnomaly) {
                statusCard.className = 'stat-card anomaly';
                statusValue.textContent = '⚠️ ANOMALY';
            } else {
                statusCard.className = 'stat-card normal';
                statusValue.textContent = '✓ Normal';
            }

            // Update chart with numeric values
            chart.data.labels.push(time);
            chart.data.datasets[0].data.push(cpuValue);
            chart.data.datasets[1].data.push(isAnomaly ? cpuValue : null);

            // Keep only last maxDataPoints
            if (chart.data.labels.length > maxDataPoints) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
                chart.data.datasets[1].data.shift();
            }

            chart.update();
            console.log('[DEBUG] Chart updated, points:', chart.data.datasets[0].data.length);
        });

        socket.on('error', (error) => {
            console.error('[ERROR]', error);
            document.getElementById('statusText').textContent = 'Error: ' + error.message;
        });

        socket.on('status', (data) => {
            console.log('[STATUS]', data.message);
        });
    </script>
</body>

</html>
